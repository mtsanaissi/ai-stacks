name: Python CI Template

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          if [ "${CI_TEMPLATE_REPLACED:-}" != "true" ]; then
            echo "::error::Replace this template workflow with the project's real install, validation, and test commands."
            echo "::error::Set CI_TEMPLATE_REPLACED=true only as a temporary marker while wiring in the real workflow."
            exit 1
          fi
          echo "CI_TEMPLATE_REPLACED=true is set. Replace this placeholder step with the repository's real CI commands."
