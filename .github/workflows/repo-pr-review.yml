name: Repo PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".agents/**"
      - ".github/prompts/**"
      - ".github/workflows/**"
      - ".gitignore"
      - ".pre-commit-config.yaml"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "README.md"
      - "skills/**"
      - "specs/**"
      - "tools/**"
  workflow_dispatch:
    inputs:
      review_paths:
        description: "Optional newline- or comma-separated changed paths to simulate for prompt targeting"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Gemini API key
        id: gemini-secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GEMINI_API_KEY is not configured; skipping AI review step."
          fi

      - name: Classify changed files
        id: classify
        if: steps.gemini-secret.outputs.enabled == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_PATHS: ${{ github.event.inputs.review_paths }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          event_name = os.environ["EVENT_NAME"]
          if event_name == "workflow_dispatch":
              raw = os.environ.get("REVIEW_PATHS", "")
              normalized = raw.replace(",", "\n")
              changed = [line.strip() for line in normalized.splitlines() if line.strip()]
          else:
              base_sha = os.environ["BASE_SHA"]
              head_sha = os.environ["HEAD_SHA"]
              changed = subprocess.check_output(
                  ["git", "diff", "--name-only", "--diff-filter=ACMR", base_sha, head_sha],
                  text=True,
              ).splitlines()

          mechanical_paths = {
              ".gitignore",
              ".pre-commit-config.yaml",
          }

          def is_mechanical(path: str) -> bool:
              if path in mechanical_paths:
                  return True
              if path.startswith(".github/workflows/") or path.startswith(".github/prompts/"):
                  return True
              return False

          substantive = [path for path in changed if not is_mechanical(path)]
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"review_needed={'true' if substantive else 'false'}\n")
          if substantive:
              print("AI review will run. Substantive changed files:")
              for path in substantive:
                  print(path)
          else:
              print("Only mechanical files changed; AI review will be skipped.")
          PY

      - name: Build targeted review prompt
        if: steps.gemini-secret.outputs.enabled == 'true' && steps.classify.outputs.review_needed == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_PATHS: ${{ github.event.inputs.review_paths }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          import subprocess

          root = Path(".")
          base_prompt = (root / ".github" / "prompts" / "repo-pr-review-base.md").read_text(encoding="utf-8").rstrip()
          event_name = os.environ["EVENT_NAME"]
          if event_name == "workflow_dispatch":
              raw = os.environ.get("REVIEW_PATHS", "")
              normalized = raw.replace(",", "\n")
              changed = [line.strip() for line in normalized.splitlines() if line.strip()]
          else:
              base_sha = os.environ["BASE_SHA"]
              head_sha = os.environ["HEAD_SHA"]
              changed = subprocess.check_output(
                  ["git", "diff", "--name-only", "--diff-filter=ACMR", base_sha, head_sha],
                  text=True,
              ).splitlines()

          checks = [
              "- Read and apply `AGENTS.md`.",
              "- Use `.continue/checks/repo-template-review.md` for template-review criteria.",
              "- Use `.continue/checks/repo-consistency.md` for broad repo consistency criteria.",
          ]
          if any(path.startswith("skills/") for path in changed):
              checks.append("- Also apply `.continue/checks/skill-review.md` because the PR touches `skills/`.")
          if any(path.endswith("/AGENTS.md") or path == "AGENTS.md" for path in changed):
              checks.append("- Also apply `.continue/checks/agent-file-alignment.md` because the PR touches agent instruction files.")
          if any(path.startswith("tools/") for path in changed):
              checks.append("- Pay extra attention to whether repo automation and validation scripts still match the documented workflow.")
          if any(path.startswith("tools/mcp_server/") or path.startswith(".vscode/mcp.json") for path in changed):
              checks.append("- Pay extra attention to MCP setup accuracy, local usability, and whether the docs match the actual server layout.")

          changed_block = "\n".join(f"- `{path}`" for path in changed) or "- No changed files detected from git diff."
          prompt = "\n\n".join(
              [
                  base_prompt,
                  "Changed files:\n\n" + changed_block,
                  "Additional review guidance:\n\n" + "\n".join(checks),
              ]
          )
          output_path = root / ".github" / "prompts" / "generated-repo-pr-review.md"
          output_path.write_text(prompt + "\n", encoding="utf-8")
          PY

      - name: Set up Node
        if: steps.gemini-secret.outputs.enabled == 'true' && steps.classify.outputs.review_needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Gemini CLI
        if: steps.gemini-secret.outputs.enabled == 'true' && steps.classify.outputs.review_needed == 'true'
        run: npm install -g @google/gemini-cli@latest

      - name: Run Gemini review
        id: gemini-review
        if: steps.gemini-secret.outputs.enabled == 'true' && steps.classify.outputs.review_needed == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
          STDOUT_FILE: ${{ runner.temp }}/gemini-stdout.json
          STDERR_FILE: ${{ runner.temp }}/gemini-stderr.log
          RESPONSE_FILE: ${{ runner.temp }}/gemini-review-response.md
          ERROR_FILE: ${{ runner.temp }}/gemini-review-error.log
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gemini"

          PROMPT_FILE=".github/prompts/generated-repo-pr-review.md"

          if ! gemini --yolo --model "$GEMINI_MODEL" --prompt "$(cat "$PROMPT_FILE")" --output-format json >"$STDOUT_FILE" 2>"$STDERR_FILE"; then
            echo "Gemini CLI execution failed." >&2
            cat "$STDERR_FILE" >&2
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          stdout_path = Path(os.environ["STDOUT_FILE"])
          stderr_path = Path(os.environ["STDERR_FILE"])
          response_path = Path(os.environ["RESPONSE_FILE"])
          error_path = Path(os.environ["ERROR_FILE"])

          raw_stdout = stdout_path.read_text(encoding="utf-8")
          raw_stderr = stderr_path.read_text(encoding="utf-8")

          response = raw_stdout.strip()
          try:
              payload = json.loads(raw_stdout)
          except json.JSONDecodeError:
              payload = None

          if isinstance(payload, dict):
              response = str(payload.get("response", "")).strip() or raw_stdout.strip()

          response_path.write_text(response + ("\n" if response else ""), encoding="utf-8")
          error_path.write_text(raw_stderr, encoding="utf-8")
          PY

      - name: Add Gemini review to job summary
        if: steps.gemini-review.outcome == 'success'
        run: |
          {
            echo "### Gemini Review"
            echo
            cat "$RUNNER_TEMP/gemini-review-response.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment Gemini review on PR
        if: github.event_name == 'pull_request' && steps.gemini-review.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          COMMENT_FILE="$RUNNER_TEMP/gemini-pr-comment.md"
          {
            echo "## Gemini Review"
            echo
            cat "$RUNNER_TEMP/gemini-review-response.md"
          } > "$COMMENT_FILE"
          gh pr comment "$PR_NUMBER" --body-file "$COMMENT_FILE"
