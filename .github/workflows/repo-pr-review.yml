name: Repo PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".agents/**"
      - ".github/prompts/**"
      - ".github/workflows/**"
      - ".gitignore"
      - ".pre-commit-config.yaml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - "skills/**"
      - "specs/**"
      - "tools/**"
  workflow_dispatch:
    inputs:
      review_paths:
        description: "Optional newline- or comma-separated changed paths to simulate for prompt targeting"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate agent files
        run: python3 tools/agent_docs/validate_agent_files.py

      - name: Validate selected local skill sync
        run: python3 tools/skills/sync_selected_skills.py --check

      - name: Validate template completeness
        run: python3 tools/template_checks/validate_templates.py

  ai-review:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Gemini API key
        id: gemini-secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GEMINI_API_KEY is not configured; skipping AI review step."
          fi

      - name: Classify changed files
        id: classify
        if: steps.gemini-secret.outputs.enabled == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_PATHS: ${{ github.event.inputs.review_paths }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          event_name = os.environ["EVENT_NAME"]
          if event_name == "workflow_dispatch":
              raw = os.environ.get("REVIEW_PATHS", "")
              normalized = raw.replace(",", "\n")
              changed = [line.strip() for line in normalized.splitlines() if line.strip()]
          else:
              base_sha = os.environ["BASE_SHA"]
              head_sha = os.environ["HEAD_SHA"]
              changed = subprocess.check_output(
                  ["git", "diff", "--name-only", "--diff-filter=ACMR", base_sha, head_sha],
                  text=True,
              ).splitlines()

          mechanical_paths = {
              ".gitignore",
              ".pre-commit-config.yaml",
          }

          def is_mechanical(path: str) -> bool:
              if path in mechanical_paths:
                  return True
              if path.endswith("/CLAUDE.md") or path.endswith("/GEMINI.md"):
                  return True
              if path in {"CLAUDE.md", "GEMINI.md"}:
                  return True
              if path.startswith(".github/workflows/") or path.startswith(".github/prompts/"):
                  return True
              return False

          substantive = [path for path in changed if not is_mechanical(path)]
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"review_needed={'true' if substantive else 'false'}\n")
          if substantive:
              print("AI review will run. Substantive changed files:")
              for path in substantive:
                  print(path)
          else:
              print("Only mechanical files changed; AI review will be skipped.")
          PY

      - name: Build targeted review prompt
        if: steps.gemini-secret.outputs.enabled == 'true' && steps.classify.outputs.review_needed == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_PATHS: ${{ github.event.inputs.review_paths }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          import subprocess

          root = Path(".")
          base_prompt = (root / ".github" / "prompts" / "repo-pr-review-base.md").read_text(encoding="utf-8").rstrip()
          event_name = os.environ["EVENT_NAME"]
          if event_name == "workflow_dispatch":
              raw = os.environ.get("REVIEW_PATHS", "")
              normalized = raw.replace(",", "\n")
              changed = [line.strip() for line in normalized.splitlines() if line.strip()]
          else:
              base_sha = os.environ["BASE_SHA"]
              head_sha = os.environ["HEAD_SHA"]
              changed = subprocess.check_output(
                  ["git", "diff", "--name-only", "--diff-filter=ACMR", base_sha, head_sha],
                  text=True,
              ).splitlines()

          checks = [
              "- Read and apply `AGENTS.md`.",
              "- Use `.agents/checks/repo-template-review.md` for template-review criteria.",
              "- Use `.agents/checks/repo-consistency.md` for broad repo consistency criteria.",
          ]
          if any(path.startswith("skills/") for path in changed):
              checks.append("- Also apply `.agents/checks/skill-review.md` because the PR touches `skills/`.")
          if any(path.endswith("/AGENTS.md") or path.endswith("/CLAUDE.md") or path.endswith("/GEMINI.md") or path in {"AGENTS.md", "CLAUDE.md", "GEMINI.md"} for path in changed):
              checks.append("- Also apply `.agents/checks/agent-file-alignment.md` because the PR touches agent instruction files.")
          if any(path.startswith("tools/") for path in changed):
              checks.append("- Pay extra attention to whether repo automation and validation scripts still match the documented workflow.")
          if any(path.startswith("tools/mcp_server/") or path.startswith(".vscode/mcp.json") for path in changed):
              checks.append("- Pay extra attention to MCP setup accuracy, local usability, and whether the docs match the actual server layout.")

          changed_block = "\n".join(f"- `{path}`" for path in changed) or "- No changed files detected from git diff."
          prompt = "\n\n".join(
              [
                  base_prompt,
                  "Changed files:\n\n" + changed_block,
                  "Additional review guidance:\n\n" + "\n".join(checks),
              ]
          )
          output_path = root / ".github" / "prompts" / "generated-repo-pr-review.md"
          output_path.write_text(prompt + "\n", encoding="utf-8")
          PY

      - name: AI review with Gemini CLI
        if: steps.gemini-secret.outputs.enabled == 'true' && steps.classify.outputs.review_needed == 'true'
        uses: google-github-actions/run-gemini-cli@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
          use-github-commenter: true
          prompt-from-file: .github/prompts/generated-repo-pr-review.md
          sandbox: true
